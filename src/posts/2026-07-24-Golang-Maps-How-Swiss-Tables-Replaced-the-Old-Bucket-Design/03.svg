<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700" role="img" aria-labelledby="title desc">
  <title id="title">Swiss Table probe sequence and h2 matching</title>
  <desc id="desc">Lookup probes groups, filters by h2 fingerprint in control bytes, checks candidate keys only, then moves to the next group.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #20313a; }
      .subtitle { font: 16px Arial, sans-serif; fill: #53646d; }
      .label { font: 700 14px Arial, sans-serif; fill: #20313a; }
      .small { font: 13px Arial, sans-serif; fill: #43565f; }
      .mono { font: 13px Consolas, Monaco, monospace; fill: #23343d; }
      .cell { stroke: #2f4858; stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1100" height="700" fill="#f7f4ee"/>

  <text x="550" y="50" text-anchor="middle" class="title">Probe Sequence with h2 Filtering</text>
  <text x="550" y="78" text-anchor="middle" class="subtitle">query key &#8594; h1 &#8594; start group, h2 filters candidate slots</text>

  <g filter="url(#shadow)">
    <rect x="50" y="110" width="1000" height="560" rx="12" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
  </g>

  <rect x="90" y="145" width="280" height="74" rx="8" fill="#e9f1f5" stroke="#2f4858"/>
  <text x="230" y="172" text-anchor="middle" class="label">Lookup key: "user:42"</text>
  <text x="230" y="195" text-anchor="middle" class="mono">hash -> h1 = 0x2d, h2 = 0x15</text>

  <line x1="370" y1="182" x2="430" y2="182" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="110" y="270" class="label">Group A (start from h1)</text>
  <g>
    <rect x="110" y="286" width="100" height="46" rx="6" fill="#d9ecf7" class="cell"/>
    <rect x="212" y="286" width="100" height="46" rx="6" fill="#d9ecf7" class="cell"/>
    <rect x="314" y="286" width="100" height="46" rx="6" fill="#d9ecf7" class="cell"/>
    <rect x="416" y="286" width="100" height="46" rx="6" fill="#d9ecf7" class="cell"/>
    <rect x="518" y="286" width="100" height="46" rx="6" fill="#fbe3cc" class="cell"/>
    <rect x="620" y="286" width="100" height="46" rx="6" fill="#d9ecf7" class="cell"/>
    <rect x="722" y="286" width="100" height="46" rx="6" fill="#d9ecf7" class="cell"/>
    <rect x="824" y="286" width="100" height="46" rx="6" fill="#d9ecf7" class="cell"/>

    <text x="160" y="313" text-anchor="middle" class="mono">0x3a</text>
    <text x="262" y="313" text-anchor="middle" class="mono">0x15</text>
    <text x="364" y="313" text-anchor="middle" class="mono">0x41</text>
    <text x="466" y="313" text-anchor="middle" class="mono">0x15</text>
    <text x="568" y="313" text-anchor="middle" class="mono">EMPTY</text>
    <text x="670" y="313" text-anchor="middle" class="mono">0x2c</text>
    <text x="772" y="313" text-anchor="middle" class="mono">0x54</text>
    <text x="874" y="313" text-anchor="middle" class="mono">0x15</text>
  </g>

  <text x="110" y="356" class="small">h2 matches at slots 1, 3, 7 -> compare keys only there</text>

  <g>
    <rect x="200" y="374" width="150" height="48" rx="6" fill="#eef4f7" stroke="#2f4858"/>
    <text x="275" y="403" text-anchor="middle" class="mono">slot1: key != query</text>

    <rect x="378" y="374" width="150" height="48" rx="6" fill="#eef4f7" stroke="#2f4858"/>
    <text x="453" y="403" text-anchor="middle" class="mono">slot3: key != query</text>

    <rect x="556" y="374" width="150" height="48" rx="6" fill="#dff2e2" stroke="#4e7a58"/>
    <text x="631" y="403" text-anchor="middle" class="mono">slot7: key == query</text>
  </g>

  <line x1="700" y1="422" x2="700" y2="590" stroke="#4e7a58" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="715" y="462" class="small">found -> return value</text>

  <g>
    <text x="110" y="560" class="label">If no candidate key matched:</text>
    <text x="110" y="584" class="small">check for EMPTY control byte. If present, key is absent. If not, continue probing next group.</text>
    <line x1="620" y1="600" x2="676" y2="600" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="680" y="590" width="180" height="58" rx="8" fill="#fff4e8" stroke="#a67c52"/>
    <text x="770" y="616" text-anchor="middle" class="mono">Group B, Group C, ...</text>
  </g>
</svg>
