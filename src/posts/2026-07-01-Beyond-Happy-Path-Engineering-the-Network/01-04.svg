<svg xmlns="http://www.w3.org/2000/svg" width="960" height="410" viewBox="0 0 960 410" role="img" aria-labelledby="title desc">
  <title id="title">Naive retry after a timeout</title>
  <desc id="desc">The checkout app sends a payment authorization request, times out before the response arrives, then sends a second authorization request to the payment service.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="410" fill="#f7f4ee"/>

  <g transform="translate(80 90)" filter="url(#shadow)">
    <rect width="220" height="118" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="110" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#20313a">Checkout app</text>
    <text x="110" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">caller</text>
  </g>

  <g transform="translate(660 90)" filter="url(#shadow)">
    <rect width="220" height="118" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="110" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#20313a">Payment service</text>
    <text x="110" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">callee</text>
  </g>

  <g font-family="Arial, sans-serif">
    <line x1="326" y1="126" x2="634" y2="126" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="408" y="88" width="144" height="30" rx="15" fill="#e7efe8" stroke="#7a9a7e"/>
    <text x="480" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#34533a">authorize #1</text>

    <line x1="634" y1="166" x2="326" y2="166" stroke="#8d9aa3" stroke-width="3" stroke-dasharray="8 8"/>
    <text x="480" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#53646d">response arrives too late or is lost</text>

    <line x1="326" y1="256" x2="634" y2="256" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="408" y="218" width="144" height="30" rx="15" fill="#f2ddd3" stroke="#b45f45"/>
    <text x="480" y="238" text-anchor="middle" font-size="14" font-weight="700" fill="#6b3729">authorize #2</text>

    <g transform="translate(190 262)">
      <circle cx="0" cy="0" r="22" fill="#f2ddd3" stroke="#b45f45" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="15" font-weight="700" fill="#6b3729">!</text>
      <text x="0" y="42" text-anchor="middle" font-size="14" fill="#53646d">retry after timeout</text>
    </g>

    <g transform="translate(770 284)">
      <rect x="-86" y="-28" width="172" height="56" rx="8" fill="#ffffff" stroke="#b45f45" stroke-width="2"/>
      <text x="0" y="-5" text-anchor="middle" font-size="14" font-weight="700" fill="#6b3729">possible duplicate</text>
      <text x="0" y="15" text-anchor="middle" font-size="14" fill="#53646d">side effect</text>
    </g>
  </g>
</svg>
