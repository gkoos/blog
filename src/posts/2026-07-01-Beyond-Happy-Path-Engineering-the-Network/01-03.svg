<svg xmlns="http://www.w3.org/2000/svg" width="960" height="340" viewBox="0 0 960 340" role="img" aria-labelledby="title desc">
  <title id="title">Checkout request timeout budget</title>
  <desc id="desc">A two second checkout request budget is divided between application work, payment authorization, inventory reservation, and response buffer.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="340" fill="#f7f4ee"/>

  <text x="80" y="62" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#20313a">Checkout request budget: 2 seconds</text>
  <text x="80" y="92" font-family="Arial, sans-serif" font-size="15" fill="#53646d">Each dependency spends part of the user's waiting time.</text>

  <g transform="translate(80 138)" filter="url(#shadow)">
    <rect width="800" height="62" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <rect x="0" y="0" width="80" height="62" rx="8" fill="#dfe9ec"/>
    <rect x="80" y="0" width="80" height="62" fill="#e7efe8"/>
    <rect x="160" y="0" width="280" height="62" fill="#efe8d8"/>
    <rect x="440" y="0" width="200" height="62" fill="#e8e1ef"/>
    <rect x="640" y="0" width="160" height="62" rx="8" fill="#f2ddd3"/>

    <line x1="80" y1="0" x2="80" y2="62" stroke="#ffffff" stroke-width="2"/>
    <line x1="160" y1="0" x2="160" y2="62" stroke="#ffffff" stroke-width="2"/>
    <line x1="440" y1="0" x2="440" y2="62" stroke="#ffffff" stroke-width="2"/>
    <line x1="640" y1="0" x2="640" y2="62" stroke="#ffffff" stroke-width="2"/>

    <text x="40" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#20313a">app</text>
    <text x="40" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#20313a">200ms</text>

    <text x="120" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#20313a">routing</text>
    <text x="120" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#20313a">200ms</text>

    <text x="300" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#20313a">payment authorization</text>
    <text x="300" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#20313a">700ms</text>

    <text x="540" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#20313a">inventory reservation</text>
    <text x="540" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#20313a">500ms</text>

    <text x="720" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#20313a">buffer</text>
    <text x="720" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#20313a">400ms</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="14" fill="#53646d">
    <line x1="80" y1="222" x2="80" y2="238" stroke="#8d9aa3" stroke-width="2"/>
    <line x1="880" y1="222" x2="880" y2="238" stroke="#8d9aa3" stroke-width="2"/>
    <text x="80" y="260" text-anchor="middle">request starts</text>
    <text x="880" y="260" text-anchor="middle">caller stops waiting</text>
  </g>

</svg>
