<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Retry with an idempotency key</title>
  <desc id="desc">Two payment authorization attempts use the same idempotency key, allowing the payment service to treat the retry as the same operation instead of a second authorization.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="430" fill="#f7f4ee"/>

  <g transform="translate(70 92)" filter="url(#shadow)">
    <rect width="220" height="118" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="110" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#20313a">Checkout app</text>
    <text x="110" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">caller</text>
  </g>

  <g transform="translate(670 92)" filter="url(#shadow)">
    <rect width="220" height="118" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="110" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#20313a">Payment service</text>
    <text x="110" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">callee</text>
  </g>

  <g transform="translate(678 260)" filter="url(#shadow)">
    <rect width="204" height="78" rx="8" fill="#ffffff" stroke="#7a9a7e" stroke-width="2"/>
    <text x="102" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#34533a">idempotency record</text>
    <text x="102" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#53646d">key: pay-789</text>
  </g>

  <g font-family="Arial, sans-serif">
    <line x1="316" y1="126" x2="644" y2="126" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="386" y="88" width="188" height="30" rx="15" fill="#e7efe8" stroke="#7a9a7e"/>
    <text x="480" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#34533a">authorize, key pay-789</text>

    <line x1="776" y1="214" x2="776" y2="252" stroke="#7a9a7e" stroke-width="3" marker-end="url(#arrow)"/>

    <line x1="316" y1="226" x2="644" y2="226" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="386" y="188" width="188" height="30" rx="15" fill="#e7efe8" stroke="#7a9a7e"/>
    <text x="480" y="208" text-anchor="middle" font-size="14" font-weight="700" fill="#34533a">retry, key pay-789</text>

    <path d="M 670 292 C 560 360, 410 360, 316 278" fill="none" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="352" y="326" width="256" height="30" rx="15" fill="#efe8d8" stroke="#b08f54"/>
    <text x="480" y="346" text-anchor="middle" font-size="14" font-weight="700" fill="#654d23">same result, not a second charge</text>
  </g>
</svg>
