<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">Load shedding protecting checkout</title>
  <desc id="desc">Gateway sends checkout requests to a saturated checkout service. The load shedder allows limited work through and rejects excess work quickly.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="390" fill="#f7f4ee"/>

  <g transform="translate(70 98)" filter="url(#shadow)">
    <rect width="210" height="118" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="105" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#20313a">Gateway</text>
    <text x="105" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">incoming requests</text>
  </g>

  <g transform="translate(375 98)" filter="url(#shadow)">
    <rect width="210" height="118" rx="8" fill="#ffffff" stroke="#b45f45" stroke-width="2"/>
    <text x="105" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#6b3729">Load shedder</text>
    <text x="105" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">checkout saturated</text>
    <text x="105" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">queue near full</text>
  </g>

  <g transform="translate(680 98)" filter="url(#shadow)">
    <rect width="210" height="118" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="105" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#20313a">Checkout</text>
    <text x="105" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">limited work</text>
  </g>

  <g font-family="Arial, sans-serif">
    <line x1="305" y1="132" x2="350" y2="132" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="610" y1="132" x2="655" y2="132" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="632" y="112" text-anchor="middle" font-size="14" fill="#53646d">accept</text>

    <path d="M 375 188 C 315 242, 245 246, 190 220" fill="none" stroke="#b45f45" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="190" y="256" width="190" height="34" rx="17" fill="#f2ddd3" stroke="#b45f45"/>
    <text x="285" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#6b3729">try again later</text>

    <line x1="480" y1="242" x2="480" y2="310" stroke="#c9c3b8" stroke-width="2"/>
    <text x="480" y="335" text-anchor="middle" font-size="14" fill="#53646d">excess work is refused before it joins a queue that cannot drain in time</text>
  </g>
</svg>
