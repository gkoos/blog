<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Happy-path payment authorization flow</title>
  <desc id="desc">The checkout application sends an authorization request across the network to a payment service, which returns an authorized or declined response.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="960" height="360" fill="#f7f4ee"/>

  <g>
    <line x1="480" y1="48" x2="480" y2="258" stroke="#b9c1c7" stroke-width="2" stroke-dasharray="8 8"/>
    <rect x="424" y="266" width="112" height="34" rx="17" fill="#ffffff" stroke="#b9c1c7"/>
    <text x="480" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#53646d">network</text>
  </g>

  <g transform="translate(80 76)" filter="url(#shadow)">
    <rect width="240" height="150" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="120" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#20313a">Checkout app</text>
    <text x="120" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">order</text>
    <text x="120" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">customer</text>
    <text x="120" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">card token</text>
  </g>

  <g transform="translate(640 76)" filter="url(#shadow)">
    <rect width="240" height="150" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="120" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#20313a">Payment service</text>
    <text x="120" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">authorize payment</text>
    <text x="120" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">record result</text>
  </g>

  <g>
    <line x1="348" y1="122" x2="612" y2="122" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="411" y="84" width="138" height="30" rx="15" fill="#e7efe8" stroke="#7a9a7e"/>
    <text x="480" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#34533a">authorize</text>
  </g>

  <g>
    <line x1="612" y1="184" x2="348" y2="184" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="378" y="196" width="204" height="30" rx="15" fill="#efe8d8" stroke="#b08f54"/>
    <text x="480" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#654d23">authorized / declined</text>
  </g>

</svg>
