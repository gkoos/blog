<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Required and deferrable checkout dependencies</title>
  <desc id="desc">Checkout keeps required payment and inventory work in the critical path, while receipt email, analytics, and recommendations move out of the user-facing response path.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="430" fill="#f7f4ee"/>

  <g transform="translate(70 154)" filter="url(#shadow)">
    <rect width="210" height="118" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="105" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#20313a">Checkout</text>
    <text x="105" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">user-facing path</text>
  </g>

  <g transform="translate(390 72)" filter="url(#shadow)">
    <rect width="210" height="96" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="105" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#20313a">Payment</text>
    <text x="105" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">required</text>
  </g>

  <g transform="translate(390 222)" filter="url(#shadow)">
    <rect width="210" height="96" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="105" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#20313a">Inventory</text>
    <text x="105" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">required</text>
  </g>

  <g transform="translate(690 72)" filter="url(#shadow)">
    <rect width="210" height="96" rx="8" fill="#ffffff" stroke="#7a9a7e" stroke-width="2"/>
    <text x="105" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#34533a">Receipt email</text>
    <text x="105" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">deferred</text>
  </g>

  <g transform="translate(690 222)" filter="url(#shadow)">
    <rect width="210" height="96" rx="8" fill="#ffffff" stroke="#7a9a7e" stroke-width="2"/>
    <text x="105" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#34533a">Analytics</text>
    <text x="105" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">best effort</text>
  </g>

  <g font-family="Arial, sans-serif">
    <line x1="305" y1="184" x2="365" y2="132" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="305" y1="238" x2="365" y2="270" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>

    <line x1="615" y1="120" x2="665" y2="120" stroke="#7a9a7e" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
    <line x1="615" y1="270" x2="665" y2="270" stroke="#7a9a7e" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow)"/>

    <rect x="322" y="352" width="316" height="34" rx="17" fill="#efe8d8" stroke="#b08f54"/>
    <text x="480" y="374" text-anchor="middle" font-size="14" font-weight="700" fill="#654d23">respond after required work is decided</text>
  </g>
</svg>
