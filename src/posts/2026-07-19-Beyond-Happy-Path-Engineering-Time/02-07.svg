<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Scheduled work can catch up in bursts</title>
  <desc id="desc">A scheduler is expected to process one minute of expiration work at a time, but after a pause it may process several missed intervals together.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="960" height="430" fill="#f7f4ee"/>

  <text x="480" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#20313a">Scheduled work is still work</text>
  <text x="480" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">A missed schedule can turn small batches into one large catch-up run</text>

  <g filter="url(#shadow)">
    <rect x="70" y="116" width="380" height="238" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="260" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#20313a">Expected</text>
    <line x1="122" y1="228" x2="398" y2="228" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>

    <g>
      <circle cx="150" cy="228" r="18" fill="#e7efe8" stroke="#7a9a7e" stroke-width="2"/>
      <text x="150" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#34533a">10:00</text>
      <text x="150" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">small batch</text>
    </g>

    <g>
      <circle cx="260" cy="228" r="18" fill="#e7efe8" stroke="#7a9a7e" stroke-width="2"/>
      <text x="260" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#34533a">10:01</text>
      <text x="260" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">small batch</text>
    </g>

    <g>
      <circle cx="370" cy="228" r="18" fill="#e7efe8" stroke="#7a9a7e" stroke-width="2"/>
      <text x="370" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#34533a">10:02</text>
      <text x="370" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">small batch</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="510" y="116" width="380" height="238" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="700" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#20313a">After a pause</text>
    <line x1="562" y1="228" x2="838" y2="228" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="584" y="188" width="232" height="80" rx="8" fill="#fff7dd" stroke="#c6a548" stroke-width="2"/>
    <text x="700" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#725b18">10:03 catch-up</text>
    <text x="700" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#53646d">10:00, 10:01, 10:02, 10:03</text>

    <text x="700" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#7b3b2e">one run may carry several missed intervals</text>
  </g>
</svg>
