<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Reservation expiration as a state transition</title>
  <desc id="desc">A reservation begins in the reserved state and can move to completed, expired, cancelled, or pending review through explicit transitions.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="960" height="430" fill="#f7f4ee"/>

  <text x="480" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#20313a">Expiration changes state</text>
  <text x="480" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">The timestamp is an input; the reservation still moves through explicit states</text>

  <g filter="url(#shadow)">
    <rect x="378" y="164" width="204" height="86" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="480" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#20313a">reserved</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="104" y="98" width="178" height="70" rx="8" fill="#e7efe8" stroke="#7a9a7e" stroke-width="2"/>
    <text x="193" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#34533a">completed</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="678" y="98" width="178" height="70" rx="8" fill="#f4e4df" stroke="#c37a68" stroke-width="2"/>
    <text x="767" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#7b3b2e">expired</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="104" y="282" width="178" height="70" rx="8" fill="#ffffff" stroke="#b9c1c7" stroke-width="2"/>
    <text x="193" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#53646d">cancelled</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="678" y="282" width="178" height="70" rx="8" fill="#fff7dd" stroke="#c6a548" stroke-width="2"/>
    <text x="767" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#725b18">pending review</text>
  </g>

  <line x1="380" y1="184" x2="286" y2="148" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="318" y="188" text-anchor="end" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#53646d">payment authorized</text>

  <line x1="580" y1="184" x2="674" y2="148" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="642" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#53646d">deadline reached</text>

  <line x1="380" y1="230" x2="286" y2="294" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="320" y="262" text-anchor="end" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#53646d">user cancels</text>

  <line x1="580" y1="230" x2="674" y2="294" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="640" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#53646d">ambiguous edge</text>
</svg>
