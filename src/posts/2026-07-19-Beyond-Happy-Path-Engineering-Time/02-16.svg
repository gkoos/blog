<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Reconciliation compares authoritative state and chooses a repair path</title>
  <desc id="desc">Local reservation state says expired, payment state says authorized, and reconciliation decides whether to complete, refund, or send to review.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f4858"/>
    </marker>
  </defs>

  <rect width="960" height="430" fill="#f7f4ee"/>

  <text x="480" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#20313a">Reconciliation handles the cases time cannot settle</text>
  <text x="480" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">Compare authoritative states, then choose a finite repair path</text>

  <g filter="url(#shadow)">
    <rect x="76" y="138" width="218" height="86" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="185" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#20313a">Local state</text>
    <text x="185" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">reservation expired</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="76" y="264" width="218" height="86" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="185" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#20313a">Payment state</text>
    <text x="185" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">charge authorized</text>
  </g>

  <line x1="306" y1="181" x2="424" y2="219" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="306" y1="307" x2="424" y2="257" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="438" y="190" width="220" height="96" rx="8" fill="#ffffff" stroke="#58724f" stroke-width="2"/>
    <text x="548" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#20313a">Reconciliation</text>
    <text x="548" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#53646d">compare current facts</text>
    <text x="548" y="271" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#53646d">apply repair policy</text>
  </g>

  <line x1="672" y1="238" x2="752" y2="238" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="766" y="124" width="130" height="58" rx="8" fill="#ffffff" stroke="#8a6f33" stroke-width="2"/>
    <text x="831" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#20313a">complete</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="766" y="210" width="130" height="58" rx="8" fill="#ffffff" stroke="#8a6f33" stroke-width="2"/>
    <text x="831" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#20313a">refund</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="766" y="296" width="130" height="58" rx="8" fill="#ffffff" stroke="#8a6f33" stroke-width="2"/>
    <text x="831" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#20313a">review</text>
  </g>
</svg>
