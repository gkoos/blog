<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">Wall-clock movement breaks elapsed-time measurement</title>
  <desc id="desc">A wall clock moves backward from 10:00:00 to 09:59:55 while work is running, causing a duration calculation based on wall-clock timestamps to appear negative.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="960" height="390" fill="#f7f4ee"/>

  <text x="480" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#20313a">Wall-clock time can move</text>
  <text x="480" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">Elapsed work needs a clock that only moves forward</text>

  <g filter="url(#shadow)">
    <rect x="90" y="132" width="210" height="96" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="195" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#20313a">start</text>
    <text x="195" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#34533a">10:00:00</text>
  </g>

  <line x1="320" y1="180" x2="640" y2="180" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="480" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#53646d">work runs</text>

  <g filter="url(#shadow)">
    <rect x="660" y="132" width="210" height="96" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="765" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#20313a">finish</text>
    <text x="765" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#7b3b2e">09:59:55</text>
  </g>

  <path d="M 650 238 C 560 300 400 300 310 238" fill="none" stroke="#c37a68" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="480" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#7b3b2e">clock correction moves wall time backward</text>

  <g>
    <rect x="278" y="328" width="404" height="38" rx="8" fill="#f4e4df" stroke="#c37a68"/>
    <text x="480" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#7b3b2e">elapsed = finish - start = negative</text>
  </g>
</svg>
