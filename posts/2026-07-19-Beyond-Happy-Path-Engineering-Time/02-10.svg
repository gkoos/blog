<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Different time meanings need different storage shapes</title>
  <desc id="desc">Three rows show an event timestamp stored as a UTC instant, a user appointment stored as local date time plus time zone, and a billing period stored as a business period with account locale.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f4858"/>
    </marker>
  </defs>

  <rect width="960" height="430" fill="#f7f4ee"/>

  <text x="480" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#20313a">Store the meaning, not just the characters</text>
  <text x="480" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">Different time questions deserve different durable shapes</text>

  <g filter="url(#shadow)">
    <rect x="70" y="112" width="210" height="58" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="175" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#20313a">Event happened</text>
    <text x="175" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">createdAt, paidAt</text>
  </g>
  <line x1="292" y1="141" x2="420" y2="141" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="432" y="112" width="456" height="58" rx="8" fill="#ffffff" stroke="#58724f" stroke-width="2"/>
    <text x="660" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#20313a">Store one stable instant</text>
    <text x="660" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">2026-03-29T00:30:00Z, display later in the viewer's zone</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="204" width="210" height="58" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="175" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#20313a">User chose a time</text>
    <text x="175" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">appointment, pickup</text>
  </g>
  <line x1="292" y1="233" x2="420" y2="233" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="432" y="204" width="456" height="58" rx="8" fill="#ffffff" stroke="#58724f" stroke-width="2"/>
    <text x="660" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#20313a">Store local date/time plus zone</text>
    <text x="660" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">2026-10-25 09:00, Europe/London</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="296" width="210" height="58" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="175" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#20313a">Business period</text>
    <text x="175" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">billing, reporting</text>
  </g>
  <line x1="292" y1="325" x2="420" y2="325" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="432" y="296" width="456" height="58" rx="8" fill="#ffffff" stroke="#58724f" stroke-width="2"/>
    <text x="660" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#20313a">Store the domain period and calendar</text>
    <text x="660" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">2026-03 billing month, account locale, cutoff rule</text>
  </g>
</svg>
