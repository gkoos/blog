<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">A time-aware reservation flow separates duration, state, scheduled work, user time, and observation</title>
  <desc id="desc">Checkout uses a monotonic request budget, stores reservation state with an expiration instant and version, schedules expiration through claimed batches, preserves user-facing time context, and emits operational signals.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f4858"/>
    </marker>
  </defs>

  <rect width="960" height="500" fill="#f7f4ee"/>

  <text x="480" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#20313a">The reservation flow after time is explicit</text>
  <text x="480" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">Each time value has one job, and each state change has an owner</text>

  <g filter="url(#shadow)">
    <rect x="72" y="126" width="174" height="82" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="159" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#20313a">Checkout</text>
    <text x="159" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">monotonic request budget</text>
  </g>

  <line x1="258" y1="167" x2="352" y2="167" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="366" y="110" width="228" height="114" rx="8" fill="#ffffff" stroke="#58724f" stroke-width="2"/>
    <text x="480" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#20313a">Reservation record</text>
    <text x="480" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">state, expiresAt instant</text>
    <text x="480" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">version, payment reference</text>
    <text x="480" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">local zone or rule when needed</text>
  </g>

  <line x1="606" y1="167" x2="704" y2="167" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="718" y="126" width="170" height="82" rx="8" fill="#ffffff" stroke="#58724f" stroke-width="2"/>
    <text x="803" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#20313a">State owner</text>
    <text x="803" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">guarded transitions</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="108" y="304" width="196" height="88" rx="8" fill="#ffffff" stroke="#8a6f33" stroke-width="2"/>
    <text x="206" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#20313a">Expiration worker</text>
    <text x="206" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">claim batch, checkpoint</text>
  </g>

  <line x1="304" y1="348" x2="418" y2="230" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="382" y="332" width="196" height="78" rx="8" fill="#ffffff" stroke="#8a6f33" stroke-width="2"/>
    <text x="480" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#20313a">Observation</text>
    <text x="480" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">lag, skew, stale writes</text>
  </g>

  <line x1="480" y1="320" x2="480" y2="238" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="656" y="304" width="196" height="88" rx="8" fill="#ffffff" stroke="#8a6f33" stroke-width="2"/>
    <text x="754" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#20313a">Reconciliation</text>
    <text x="754" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">compare facts, repair edge cases</text>
  </g>

  <line x1="656" y1="348" x2="542" y2="230" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="480" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#20313a">The design is still small; the time assumptions are now visible and owned</text>
</svg>
