<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Happy-path reservation timeline</title>
  <desc id="desc">A checkout reservation starts at 10:00, payment is authorized at 10:08, the order completes at 10:09, and the later expiration check sees that the reservation is already complete.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="960" height="360" fill="#f7f4ee"/>

  <g>
    <text x="480" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#20313a">Reservation happy path</text>
    <text x="480" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">One clock, prompt work, clear ordering</text>
  </g>

  <line x1="112" y1="184" x2="848" y2="184" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="116" width="160" height="92" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="160" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#20313a">10:00</text>
    <text x="160" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">reserve item</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="296" y="116" width="160" height="92" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="376" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#20313a">10:08</text>
    <text x="376" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">payment</text>
    <text x="376" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">authorized</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="512" y="116" width="160" height="92" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="592" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#20313a">10:09</text>
    <text x="592" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">order</text>
    <text x="592" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">complete</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="728" y="116" width="160" height="92" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="808" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#20313a">10:15</text>
    <text x="808" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">expiration check</text>
    <text x="808" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">does nothing</text>
  </g>

  <g>
    <rect x="126" y="252" width="708" height="50" rx="8" fill="#e7efe8" stroke="#7a9a7e"/>
    <text x="480" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#34533a">Every decision sees the same timeline</text>
  </g>
</svg>
