<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Time bugs can spread quietly</title>
  <desc id="desc">A wrong time assumption can move from an expiration decision into cache state, user behavior, support tickets, and operational signals before it is recognized.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="960" height="430" fill="#f7f4ee"/>

  <text x="480" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#20313a">Time bugs rarely stay local</text>
  <text x="480" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">A small time assumption can travel through state, caches, users, and operations</text>

  <g filter="url(#shadow)">
    <rect x="76" y="168" width="150" height="86" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="151" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#20313a">early</text>
    <text x="151" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#20313a">expiration</text>
  </g>

  <line x1="230" y1="211" x2="298" y2="211" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="306" y="168" width="150" height="86" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="381" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#20313a">stale</text>
    <text x="381" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#20313a">cache state</text>
  </g>

  <line x1="460" y1="211" x2="528" y2="211" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="536" y="168" width="150" height="86" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="611" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#20313a">confusing</text>
    <text x="611" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#20313a">user state</text>
  </g>

  <line x1="690" y1="211" x2="758" y2="211" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="766" y="168" width="150" height="86" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="841" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#20313a">misleading</text>
    <text x="841" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#20313a">support trail</text>
  </g>

  <rect x="238" y="318" width="484" height="42" rx="8" fill="#ffffff" stroke="#b9c1c7"/>
  <text x="480" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#20313a">The first visible symptom may look like ordinary business logic</text>
</svg>
