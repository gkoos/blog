<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Product time rules need their owning context</title>
  <desc id="desc">Three product questions map to duration logic, local time with a time zone, and business calendar rules.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f4858"/>
    </marker>
  </defs>

  <rect width="960" height="430" fill="#f7f4ee"/>

  <text x="480" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#20313a">Ask which rule owns the time</text>
  <text x="480" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">The stored value should carry the context needed to interpret it later</text>

  <g filter="url(#shadow)">
    <rect x="72" y="118" width="252" height="64" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="198" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#20313a">Expire 15 minutes from now</text>
    <text x="198" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">elapsed duration</text>
  </g>
  <line x1="336" y1="150" x2="456" y2="150" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="470" y="118" width="418" height="64" rx="8" fill="#ffffff" stroke="#58724f" stroke-width="2"/>
    <text x="679" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#20313a">Duration budget</text>
    <text x="679" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">monotonic measurement, expiration instant for storage</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="204" width="252" height="64" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="198" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#20313a">Pickup at 9 AM London</text>
    <text x="198" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">future local promise</text>
  </g>
  <line x1="336" y1="236" x2="456" y2="236" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="470" y="204" width="418" height="64" rx="8" fill="#ffffff" stroke="#58724f" stroke-width="2"/>
    <text x="679" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#20313a">Local date/time plus zone</text>
    <text x="679" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">2026-10-25 09:00, Europe/London</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="290" width="252" height="64" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="198" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#20313a">Orders from yesterday</text>
    <text x="198" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">reporting question</text>
  </g>
  <line x1="336" y1="322" x2="456" y2="322" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="470" y="290" width="418" height="64" rx="8" fill="#ffffff" stroke="#58724f" stroke-width="2"/>
    <text x="679" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#20313a">Reporting calendar</text>
    <text x="679" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">account, region, warehouse, or business day rule</text>
  </g>
</svg>
