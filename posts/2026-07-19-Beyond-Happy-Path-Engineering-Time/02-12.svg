<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Expiration should leave room for retry and review</title>
  <desc id="desc">A reserved item can complete, expire, or move into review. Expired records preserve enough information for restoration, compensation, or audit.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f4858"/>
    </marker>
  </defs>

  <rect width="960" height="430" fill="#f7f4ee"/>

  <text x="480" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#20313a">Expiration is a recoverable state change</text>
  <text x="480" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">The timestamp starts a decision; the model keeps enough state to retry, explain, or repair it</text>

  <g filter="url(#shadow)">
    <rect x="96" y="176" width="150" height="70" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="171" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#20313a">reserved</text>
    <text x="171" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">hold is active</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="406" y="116" width="150" height="70" rx="8" fill="#ffffff" stroke="#58724f" stroke-width="2"/>
    <text x="481" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#20313a">completed</text>
    <text x="481" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">payment won</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="406" y="236" width="150" height="70" rx="8" fill="#ffffff" stroke="#58724f" stroke-width="2"/>
    <text x="481" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#20313a">expired</text>
    <text x="481" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">hold released</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="700" y="176" width="164" height="70" rx="8" fill="#ffffff" stroke="#8a6f33" stroke-width="2"/>
    <text x="782" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#20313a">review</text>
    <text x="782" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#53646d">restore or compensate</text>
  </g>

  <line x1="258" y1="197" x2="393" y2="158" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="318" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#53646d">complete</text>

  <line x1="258" y1="225" x2="393" y2="264" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="318" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#53646d">expire</text>

  <line x1="570" y1="267" x2="688" y2="232" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="622" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#53646d">ambiguous edge</text>

  <line x1="700" y1="199" x2="570" y2="162" stroke="#2f4858" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="628" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#53646d">repair</text>

  <text x="480" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#20313a">A retry can repeat the expiration attempt; review handles the cases the rule cannot decide automatically</text>
</svg>
