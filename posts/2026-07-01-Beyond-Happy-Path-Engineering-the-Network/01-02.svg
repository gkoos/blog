<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">Network call failure points</title>
  <desc id="desc">A payment authorization request can fail before the connection opens, while the request travels to the service, while the payment service works, or while the response travels back.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="390" fill="#f7f4ee"/>

  <g transform="translate(70 104)" filter="url(#shadow)">
    <rect width="220" height="118" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="110" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#20313a">Checkout app</text>
    <text x="110" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">caller</text>
  </g>

  <g transform="translate(670 104)" filter="url(#shadow)">
    <rect width="220" height="118" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="110" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#20313a">Payment service</text>
    <text x="110" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#53646d">callee</text>
  </g>

  <line x1="316" y1="144" x2="644" y2="144" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="480" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#34533a">authorization request</text>

  <line x1="644" y1="186" x2="316" y2="186" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="480" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#654d23">authorization response</text>

  <g font-family="Arial, sans-serif" font-size="13" fill="#20313a">
    <g transform="translate(305 70)">
      <circle cx="0" cy="20" r="20" fill="#f2ddd3" stroke="#b45f45" stroke-width="2"/>
      <text x="0" y="25" text-anchor="middle" font-weight="700">1</text>
      <text x="0" y="-28" text-anchor="middle">connection</text>
      <text x="0" y="-10" text-anchor="middle">never opens</text>
    </g>

    <g transform="translate(438 64)">
      <circle cx="0" cy="20" r="20" fill="#f2ddd3" stroke="#b45f45" stroke-width="2"/>
      <text x="0" y="25" text-anchor="middle" font-weight="700">2</text>
      <text x="0" y="-34" text-anchor="middle">request lost</text>
      <text x="0" y="-16" text-anchor="middle">or reset</text>
    </g>

    <g transform="translate(780 270)">
      <circle cx="0" cy="0" r="20" fill="#f2ddd3" stroke="#b45f45" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-weight="700">3</text>
      <text x="0" y="42" text-anchor="middle">service slow</text>
      <text x="0" y="60" text-anchor="middle">or overloaded</text>
    </g>

    <g transform="translate(522 260)">
      <circle cx="0" cy="0" r="20" fill="#f2ddd3" stroke="#b45f45" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-weight="700">4</text>
      <text x="0" y="42" text-anchor="middle">response lost</text>
      <text x="0" y="60" text-anchor="middle">or too late</text>
    </g>
  </g>
</svg>
