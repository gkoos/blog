<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Retry timing with backoff and jitter</title>
  <desc id="desc">Several clients retry after a failed payment request. Fixed retry timing lines up retries, while jitter spreads retry attempts across time.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="360" fill="#f7f4ee"/>

  <g font-family="Arial, sans-serif">
    <text x="80" y="56" font-size="22" font-weight="700" fill="#20313a">Fixed retry timing</text>
    <text x="535" y="56" font-size="22" font-weight="700" fill="#20313a">Backoff with jitter</text>

    <g transform="translate(80 92)" filter="url(#shadow)">
      <rect width="345" height="196" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
      <line x1="42" y1="152" x2="306" y2="152" stroke="#8d9aa3" stroke-width="2"/>
      <line x1="76" y1="132" x2="76" y2="166" stroke="#c9c3b8" stroke-width="2"/>
      <line x1="164" y1="132" x2="164" y2="166" stroke="#c9c3b8" stroke-width="2"/>
      <line x1="252" y1="132" x2="252" y2="166" stroke="#c9c3b8" stroke-width="2"/>

      <g fill="#f2ddd3" stroke="#b45f45" stroke-width="2">
        <circle cx="76" cy="64" r="12"/>
        <circle cx="76" cy="94" r="12"/>
        <circle cx="76" cy="124" r="12"/>
        <circle cx="164" cy="64" r="12"/>
        <circle cx="164" cy="94" r="12"/>
        <circle cx="164" cy="124" r="12"/>
        <circle cx="252" cy="64" r="12"/>
        <circle cx="252" cy="94" r="12"/>
        <circle cx="252" cy="124" r="12"/>
      </g>

      <text x="76" y="184" text-anchor="middle" font-size="13" fill="#53646d">initial</text>
      <text x="164" y="184" text-anchor="middle" font-size="13" fill="#53646d">+300ms</text>
      <text x="252" y="184" text-anchor="middle" font-size="13" fill="#53646d">+700ms</text>
    </g>

    <g transform="translate(535 92)" filter="url(#shadow)">
      <rect width="345" height="196" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
      <line x1="42" y1="152" x2="306" y2="152" stroke="#8d9aa3" stroke-width="2"/>
      <line x1="76" y1="132" x2="76" y2="166" stroke="#c9c3b8" stroke-width="2"/>
      <line x1="164" y1="132" x2="164" y2="166" stroke="#c9c3b8" stroke-width="2"/>
      <line x1="252" y1="132" x2="252" y2="166" stroke="#c9c3b8" stroke-width="2"/>

      <g fill="#e7efe8" stroke="#7a9a7e" stroke-width="2">
        <circle cx="76" cy="64" r="12"/>
        <circle cx="76" cy="94" r="12"/>
        <circle cx="76" cy="124" r="12"/>
        <circle cx="184" cy="64" r="12"/>
        <circle cx="200" cy="94" r="12"/>
        <circle cx="176" cy="124" r="12"/>
        <circle cx="268" cy="64" r="12"/>
        <circle cx="304" cy="94" r="12"/>
        <circle cx="286" cy="124" r="12"/>
      </g>

      <text x="76" y="184" text-anchor="middle" font-size="13" fill="#53646d">initial</text>
      <text x="164" y="184" text-anchor="middle" font-size="13" fill="#53646d">+300ms</text>
      <text x="252" y="184" text-anchor="middle" font-size="13" fill="#53646d">+700ms</text>
    </g>
  </g>
</svg>
