<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">Deadline propagation and cancellation</title>
  <desc id="desc">A checkout request passes a deadline to payment and inventory work. When the caller stops waiting, cancellation tells downstream work that the result may no longer be useful.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <marker id="stop" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8">
      <circle cx="5" cy="5" r="4" fill="#b45f45"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18313f" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="390" fill="#f7f4ee"/>

  <g transform="translate(70 78)" filter="url(#shadow)">
    <rect width="190" height="88" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="95" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#20313a">Gateway</text>
    <text x="95" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#53646d">deadline: 2s</text>
  </g>

  <g transform="translate(385 78)" filter="url(#shadow)">
    <rect width="190" height="88" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="95" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#20313a">Checkout</text>
    <text x="95" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#53646d">remaining budget</text>
  </g>

  <g transform="translate(700 48)" filter="url(#shadow)">
    <rect width="190" height="72" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="95" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#20313a">Payment</text>
    <text x="95" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#53646d">700ms</text>
  </g>

  <g transform="translate(700 160)" filter="url(#shadow)">
    <rect width="190" height="72" rx="8" fill="#ffffff" stroke="#2f4858" stroke-width="2"/>
    <text x="95" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#20313a">Inventory</text>
    <text x="95" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#53646d">500ms</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="14" fill="#53646d">
    <line x1="285" y1="122" x2="360" y2="122" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="322" y="105" text-anchor="middle">deadline</text>

    <line x1="600" y1="110" x2="675" y2="82" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="632" y="70" text-anchor="middle">budget</text>

    <line x1="600" y1="134" x2="675" y2="190" stroke="#2f4858" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="632" y="178" text-anchor="middle">budget</text>
  </g>

  <g font-family="Arial, sans-serif">
    <line x1="90" y1="302" x2="870" y2="302" stroke="#8d9aa3" stroke-width="2"/>
    <line x1="90" y1="286" x2="90" y2="318" stroke="#8d9aa3" stroke-width="2"/>
    <line x1="690" y1="286" x2="690" y2="318" stroke="#b45f45" stroke-width="3" marker-end="url(#stop)"/>
    <text x="90" y="342" text-anchor="middle" font-size="14" fill="#53646d">request starts</text>
    <text x="690" y="342" text-anchor="middle" font-size="14" font-weight="700" fill="#6b3729">caller stops waiting</text>

    <path d="M 690 272 C 655 245, 620 224, 575 166" fill="none" stroke="#b45f45" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
    <text x="570" y="258" text-anchor="middle" font-size="14" font-weight="700" fill="#6b3729">cancel signal</text>
  </g>
</svg>
